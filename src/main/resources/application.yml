spring:
  application:
    name: ejercicio-java-springboot
  datasource:
    url: jdbc:h2:mem:usuariosdb
    driver-class-name: org.h2.Driver
    username: sa
    password: pass

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  validation:
    emailRegex: "^[A-Za-z0-9+_.-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$"
    passwordRegex: "^[A-Za-z]{4,8}[0-9]{1,3}$"
    telefonoRegex: "^\\d{9}$"
  jwt:
    secret: MiClaveSuperSecretaParaNisum2026MiClaveSuperSecreta
    expiration: 86400000
